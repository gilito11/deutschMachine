<div class="text-center py-8">
    <div class="text-6xl mb-4">&#127942;</div>
    <h2 class="text-2xl font-bold mb-2">Lesson Complete!</h2>
    <p class="text-gray-500 dark:text-gray-400 mb-4">{{ lesson.title }}</p>

    <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-4 mb-6 inline-block">
        <div class="flex gap-8">
            <div>
                <p class="text-2xl font-bold text-primary-600">{{ progress.accuracy }}%</p>
                <p class="text-xs text-gray-500">Accuracy</p>
            </div>
            <div>
                <p class="text-2xl font-bold text-green-600">{{ progress.correct_answers }}/{{ progress.total_answered }}</p>
                <p class="text-xs text-gray-500">Correct</p>
            </div>
            <div>
                <p class="text-2xl font-bold text-yellow-600">+{{ progress.xp_earned }}</p>
                <p class="text-xs text-gray-500">XP</p>
            </div>
        </div>
    </div>

    <div class="flex gap-3 justify-center">
        <form method="post" action="{% url 'lessons:restart' lesson.slug %}">
            {% csrf_token %}
            <button type="submit" class="px-5 py-2.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-700 dark:text-gray-300 font-medium rounded-xl transition-colors">
                Retry
            </button>
        </form>
        <a href="{% url 'lessons:list' %}?lang={{ lesson.language.code }}"
           class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-xl transition-colors">
            More Lessons
        </a>
    </div>
</div>
