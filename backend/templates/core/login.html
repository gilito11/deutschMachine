{% extends 'base.html' %}
{% block title %}Login - deutschMachine{% endblock %}

{% block auth_content %}
<div class="max-w-md w-full space-y-8">
    <div class="text-center">
        <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <span class="text-white font-bold text-2xl">dM</span>
        </div>
        <h2 class="text-3xl font-bold">deutschMachine</h2>
        <p class="mt-2 text-gray-600 dark:text-gray-400">Learn languages with science</p>
    </div>

    <form method="post" class="space-y-6 bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm">
        {% csrf_token %}
        {% if form.errors %}
        <div class="bg-red-50 dark:bg-red-900/50 text-red-600 dark:text-red-300 p-3 rounded-lg text-sm">
            Invalid username or password.
        </div>
        {% endif %}

        <div>
            <label for="id_username" class="block text-sm font-medium mb-1">Username</label>
            <input type="text" name="username" id="id_username" required autofocus
                   class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>

        <div>
            <label for="id_password" class="block text-sm font-medium mb-1">Password</label>
            <input type="password" name="password" id="id_password" required
                   class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
            Log in
        </button>
    </form>

    <p class="text-center text-sm text-gray-600 dark:text-gray-400">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-primary-600 hover:text-primary-500 font-medium">Sign up</a>
    </p>
</div>
{% endblock %}
