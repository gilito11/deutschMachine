{% extends 'base.html' %}

{% block title %}No Cards Due - deutschMachine{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto text-center py-16">
    <div class="text-6xl mb-4">&#9989;</div>

    <p class="text-gray-500 dark:text-gray-400 mb-8">No cards due for review right now. Come back later or add new vocabulary.</p>

    <div class="flex space-x-3 justify-center">

        <a href="{% url 'vocabulary:browse' %}"
