{% if exercise %}
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 border border-gray-200 dark:border-gray-700"
     x-data="{ showHint: false }">

    <!-- Case badge + difficulty -->
    <div class="flex items-center justify-between mb-6">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold {{ case_colors.bg }} {{ case_colors.text }}">
            {{ exercise.case }}
        </span>
        <span class="text-xs font-medium px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400">
            {{ exercise.difficulty }}
        </span>
    </div>

    <!-- Sentence with blank -->
    <div class="text-center mb-8">
        <p class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white leading-relaxed">
            {% for part in sentence_parts %}{% if not forloop.first %}<span class="inline-block w-16 sm:w-24 border-b-4 {{ case_colors.border }} mx-1 align-bottom"></span>{% endif %}{{ part }}{% endfor %}
        </p>
    </div>

    <!-- Hint button -->
    <div class="text-center mb-6">
        <button @click="showHint = !showHint" data-hint-toggle
                class="text-sm text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
            <span x-show="!showHint">Show hint</span>
            <span x-show="showHint" x-cloak>{{ exercise.hint }}</span>
        </button>
    </div>

    <!-- Options grid -->
    <div class="grid grid-cols-2 gap-3">
        {% for option in exercise.options %}
        <button data-option="{{ option }}"
                hx-post="{% url 'trainers:case_check' %}"
                hx-vals='{"exercise_idx": "{{ exercise_idx }}", "answer": "{{ option }}"}'
                hx-target="#case-drill-area"
                hx-swap="innerHTML"
                class="relative py-4 px-6 rounded-xl text-xl font-bold
                       bg-gray-50 dark:bg-gray-700 border-2 border-gray-200 dark:border-gray-600
                       hover:border-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20
                       active:scale-95 transition-all duration-150
                       text-gray-800 dark:text-gray-100
                       focus:outline-none focus:ring-2 focus:ring-primary-400">
            <span class="absolute top-1.5 left-2.5 text-xs font-medium text-gray-400 dark:text-gray-500">{{ forloop.counter }}</span>
            {{ option }}
        </button>
        {% endfor %}
    </div>
</div>
{% else %}
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 text-center border border-gray-200 dark:border-gray-700">
    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">No exercises available</h2>
    <p class="text-gray-500 dark:text-gray-400">Something went wrong loading exercises.</p>
</div>
{% endif %}
