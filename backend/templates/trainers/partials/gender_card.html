{% if item %}
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 text-center border border-gray-200 dark:border-gray-700">
    <!-- Word display -->
    <div class="mb-2">
        <span class="text-5xl font-bold text-gray-900 dark:text-white tracking-tight">{{ noun_word }}</span>
    </div>
    <p class="text-gray-400 dark:text-gray-500 text-lg mb-8">{{ item.translation_es }}</p>

    <!-- Gender buttons -->
    <div class="flex gap-3 justify-center">
        <button data-gender="der"
                hx-post="{% url 'trainers:gender_check' %}"
                hx-vals='{"item_id": "{{ item.id }}", "answer": "der"}'
                hx-target="#drill-area"
                hx-swap="innerHTML"
                class="flex-1 max-w-[140px] py-4 px-6 rounded-xl text-white text-2xl font-bold
                       bg-blue-500 hover:bg-blue-600 active:scale-95
                       transition-all duration-150 shadow-md hover:shadow-lg
                       focus:outline-none focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800">
            der
        </button>
        <button data-gender="die"
                hx-post="{% url 'trainers:gender_check' %}"
                hx-vals='{"item_id": "{{ item.id }}", "answer": "die"}'
                hx-target="#drill-area"
                hx-swap="innerHTML"
                class="flex-1 max-w-[140px] py-4 px-6 rounded-xl text-white text-2xl font-bold
                       bg-rose-500 hover:bg-rose-600 active:scale-95
                       transition-all duration-150 shadow-md hover:shadow-lg
                       focus:outline-none focus:ring-4 focus:ring-rose-300 dark:focus:ring-rose-800">
            die
        </button>
        <button data-gender="das"
                hx-post="{% url 'trainers:gender_check' %}"
                hx-vals='{"item_id": "{{ item.id }}", "answer": "das"}'
                hx-target="#drill-area"
                hx-swap="innerHTML"
                class="flex-1 max-w-[140px] py-4 px-6 rounded-xl text-white text-2xl font-bold
                       bg-amber-500 hover:bg-amber-600 active:scale-95
                       transition-all duration-150 shadow-md hover:shadow-lg
                       focus:outline-none focus:ring-4 focus:ring-amber-300 dark:focus:ring-amber-800">
            das
        </button>
    </div>
</div>
{% else %}
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 text-center border border-gray-200 dark:border-gray-700">
    <div class="text-6xl mb-4">📚</div>
    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2">No nouns available</h2>
    <p class="text-gray-500 dark:text-gray-400">Add German vocabulary with gender info to start practicing.</p>
    <a href="{% url 'vocabulary:browse' %}" class="inline-block mt-4 px-4 py-2 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition-colors">
        Go to Vocabulary
    </a>
</div>
{% endif %}
